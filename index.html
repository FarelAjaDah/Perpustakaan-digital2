<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pustaka Furina v3 - Modern Sync</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-body: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-soft: #64748b;
      --primary: #334155; /* Warna slate yang lebih profesional */
      --accent: #3b82f6;
      --input-bg: #f1f5f9;
      --glass-border: rgba(0, 0, 0, 0.05);
      --nav-bg: rgba(30, 41, 59, 0.95);
    }

    [data-theme="dark"] {
      --bg-body: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f1f5f9;
      --text-soft: #94a3b8;
      --input-bg: #334155;
      --glass-border: rgba(255, 255, 255, 0.1);
      --nav-bg: rgba(15, 23, 42, 0.9);
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      margin: 0; padding: 0; 
      transition: background 0.3s, color 0.3s, transform 0.2s ease; 
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg-body); 
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- LOGIN PAGE --- */
    #loginPage {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--card-bg);
      padding: 40px 30px;
      border-radius: 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1px solid var(--glass-border);
      box-shadow: 0 10px 25px rgba(0,0,0,0.03);
    }

    .login-card h1 { font-size: 48px; margin-bottom: 10px; }
    .login-card h2 { font-weight: 800; font-size: 24px; margin-bottom: 8px; color: var(--primary); }
    .login-card p { color: var(--text-soft); font-size: 14px; margin-bottom: 30px; }

    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      margin-left: 12px;
      margin-bottom: 6px;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 16px;
      border: 1px solid transparent;
      background: var(--input-bg);
      color: var(--text-main);
      font-family: inherit;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--card-bg);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    /* --- BUTTONS --- */
    .btn-main {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-main:active { transform: scale(0.98); }

    /* --- MAIN APP LAYOUT --- */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg-body);
      padding: 25px 24px;
      border-bottom: 1px solid var(--glass-border);
    }

    .content { padding: 24px 24px 140px; max-width: 600px; margin: auto; }

    .books-grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 16px; 
    }
    
    .book-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px 16px;
      border: 1px solid var(--glass-border);
      text-decoration: none;
      color: inherit;
      text-align: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
    }

    .book-cover {
      width: 60px; height: 60px; margin: 0 auto 12px;
      border-radius: 18px; display: flex; align-items: center; justify-content: center; 
      font-size: 28px;
    }

    /* --- NAV BAR --- */
    .nav-bar {
      position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 400px; 
      background: var(--nav-bg);
      padding: 8px; border-radius: 24px; 
      display: flex; z-index: 1000;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .nav-item {
      flex: 1; padding: 12px; text-align: center; color: #94a3b8;
      font-weight: 700; font-size: 13px; border-radius: 18px; cursor: pointer;
    }
    .nav-item.active { background: #ffffff; color: #0f172a; }
    [data-theme="dark"] .nav-item.active { background: var(--accent); color: white; }

    /* --- UTILS --- */
    .hidden { display: none !important; }
    .animate { animation: fadeInUp 0.5s ease both; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    #roleBadge {
      font-size: 10px; font-weight: 800; 
      color: var(--accent); 
      background: rgba(59, 130, 246, 0.1); 
      padding: 4px 10px; border-radius: 8px;
    }
  </style>
</head>
<body data-theme="light">

  <div id="loginPage">
    <div class="login-card animate">
      <h1>📖</h1>
      <h2>Pustaka Digital</h2>
      <p>Akses materi belajar dengan Susah</p>
      
      <div class="input-group">
        <label>Nama Pengguna</label>
        <input type="text" id="usernameInput" placeholder="Contoh: Farel Sehat">
      </div>

      <div class="input-group" style="margin-bottom: 25px;">
        <label>Kode Akses</label>
        <input type="password" id="passcodeInput" placeholder="masukkan kode akses..." style="text-transform: uppercase;">
      </div>

      <button class="btn-main" onclick="handleLogin()">Masuk Sekarang</button>
    </div>
  </div>

  <div id="mainPage" class="hidden">
    <div class="header">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <span id="roleBadge">SYSTEM ONLINE</span>
        <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-weight: 700; color: var(--text-soft); font-size: 12px;">🌓 Tema</button>
      </div>
      <h2 id="welcomeText" style="font-weight: 800; letter-spacing: -0.5px; font-size: 24px;">Halo! 👋</h2>
      <input type="text" id="searchInput" placeholder="Cari judul materi..." onkeyup="renderBooks(this.value)" 
             style="margin-top: 15px;">
    </div>

    <div class="content">
      <div id="bookList" class="books-grid"></div>

      <div id="kelasSection" class="hidden animate">
        <div style="background: var(--card-bg); padding: 30px 20px; border-radius: 28px; text-align: center; border: 1px solid var(--glass-border);">
            
            <div id="guruView" class="hidden">
                <p style="color: var(--text-soft); font-weight: 600; font-size: 13px;">KODE KELAS AKTIF</p>
                <h1 id="activeCode" style="font-size: 42px; color: var(--accent); letter-spacing: 4px; margin: 10px 0;">-----</h1>
                <button onclick="tambahSoalKuis()" style="background:#10b981; color:white; border:none; padding:14px; border-radius:14px; font-weight:700; width:100%; margin-bottom:12px; cursor:pointer;">➕ Tambah Soal Kuis</button>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-main" onclick="updateClassStatus('Quiz')" style="background: #ef4444;">📝 Kuis</button>
                    <button class="btn-main" onclick="updateClassStatus('Presentasi')" style="background: #6366f1;">📺 Slide</button>
                </div>
                <button class="btn-main" onclick="updateClassStatus('Selesai')" style="background: var(--text-soft); margin-top: 10px;">Akhiri Sesi</button>
            </div>

            <div id="muridView" class="hidden">
                <div id="joinArea">
                    <h3 style="margin-bottom: 15px;">Gabung Kelas Live</h3>
                    <input type="text" id="inputClassCode" placeholder="Kode dari Guru" style="text-align: center; margin-bottom: 15px; text-transform: uppercase;">
                    <button class="btn-main" onclick="joinClass()">Masuk Kelas</button>
                </div>
                <div id="liveClassArea" class="hidden">
                    <div style="background: var(--accent); color: white; padding: 15px; border-radius: 16px; margin-bottom: 20px;">
                        <h2 id="currentStatus" style="font-size: 18px;">MENUNGGU...</h2>
                    </div>
                    <div id="classContent" style="padding: 30px 20px; border: 2px dashed var(--glass-border); border-radius: 20px; color: var(--text-soft);">
                        Menunggu instruksi Guru...
                    </div>
                </div>
            </div>
        </div>
      </div>
    </div>

    <div class="nav-bar">
      <div class="nav-item active" id="nav-books" onclick="showSection('books')">Koleksi</div>
      <div class="nav-item" id="nav-kelas" onclick="showSection('kelas')">Sync</div>
      <div class="nav-item" onclick="logout()" style="color: #ef4444;">Keluar</div>
    </div>
  </div>

  <script>
    const FIREBASE_URL = "https://perpustakaan-digital-5e62a-default-rtdb.asia-southeast1.firebasedatabase.app/class_sync.json";
    const ACCESS_KEYS = { "AKUGURU": "Guru", "MURID": "Murid" };
    
    const books = [
      { title: "Matematika", file: "matematika.pdf", emoji: "📐", color: "#3b82f6" },
      { title: "Sejarah", file: "sejarah.pdf", emoji: "📜", color: "#f59e0b" },
      { title: "Biologi", file: "biologi.pdf", emoji: "🌿", color: "#10b981" },
      { title: "Fisika", file: "fisika.pdf", emoji: "⚛️", color: "#ef4444" },
      { title: "Sains", file: "sains.pdf", emoji: "🔬", color: "#8b5cf6" }
    ];

    let currentQuizData = [];
    let syncInterval;

    function handleLogin() {
      const userVal = document.getElementById("usernameInput").value.trim();
      const passVal = document.getElementById("passcodeInput").value.trim().toUpperCase();
      
      if (ACCESS_KEYS[passVal]) {
        localStorage.setItem("user_role", ACCESS_KEYS[passVal]);
        localStorage.setItem("user_name", userVal || "Pelajar");
        initApp();
      } else { 
        alert("Kode Akses Salah!"); 
      }
    }

    function initApp() {
      const role = localStorage.getItem("user_role");
      const name = localStorage.getItem("user_name");
      if(!role) return;

      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("mainPage").classList.remove("hidden");
      document.getElementById("roleBadge").innerText = role.toUpperCase() + " ONLINE";
      document.getElementById("welcomeText").innerText = `Halo, ${name}! 👋`;
      renderBooks("");
    }

    function renderBooks(kw) {
      const list = document.getElementById("bookList");
      list.innerHTML = "";
      const filtered = books.filter(b => b.title.toLowerCase().includes(kw.toLowerCase()));
      
      if(filtered.length === 0) {
        list.innerHTML = `<p style="grid-column: span 2; color: var(--text-soft); padding: 20px;">Materi tidak ditemukan...</p>`;
        return;
      }

      filtered.forEach(b => {
        list.innerHTML += `
          <div class="book-card animate" onclick="window.open('books/${b.file}', '_blank')">
            <div class="book-cover" style="background: ${b.color}15; color: ${b.color};">${b.emoji}</div>
            <div style="font-weight: 700; font-size: 14px; color: var(--text-main);">${b.title}</div>
          </div>`;
      });
    }

    function showSection(type) {
      document.getElementById("bookList").classList.toggle("hidden", type !== 'books');
      document.getElementById("kelasSection").classList.toggle("hidden", type !== 'kelas');
      document.getElementById("nav-books").classList.toggle("active", type === 'books');
      document.getElementById("nav-kelas").classList.toggle("active", type === 'kelas');
      if(type === 'kelas') setupKelasUI();
    }

    function setupKelasUI() {
      const isGuru = localStorage.getItem("user_role") === "Guru";
      document.getElementById("guruView").classList.toggle("hidden", !isGuru);
      document.getElementById("muridView").classList.toggle("hidden", isGuru);
      
      fetch(FIREBASE_URL).then(res => res.json()).then(data => { 
        if(data && data.code) document.getElementById("activeCode").innerText = data.code; 
      });
    }

    function tambahSoalKuis() {
        const tanya = prompt("Pertanyaan:");
        if(!tanya) return;
        const a = prompt("Opsi A:");
        const b = prompt("Opsi B:");
        currentQuizData.push({ soal: tanya, opsi: {A:a, B:b} });
        alert("Soal ditambahkan!");
    }

    function updateClassStatus(tipe) {
      let currentCode = document.getElementById("activeCode").innerText;
      if (currentCode === "-----" || tipe === 'Selesai') {
        currentCode = (tipe === 'Selesai') ? "-----" : Math.random().toString(36).substring(2, 7).toUpperCase();
      }
      
      let payload = { code: currentCode, status: tipe };
      if(tipe === 'Quiz') payload.questions = currentQuizData;

      fetch(FIREBASE_URL, { method: 'PUT', body: JSON.stringify(payload) }).then(() => {
        document.getElementById("activeCode").innerText = currentCode;
        alert("Kelas sekarang: " + tipe);
      });
    }

    function joinClass() {
      const input = document.getElementById("inputClassCode").value.toUpperCase();
      fetch(FIREBASE_URL).then(res => res.json()).then(data => {
        if (input === data.code && data.code !== "-----") {
          document.getElementById("joinArea").classList.add("hidden");
          document.getElementById("liveClassArea").classList.remove("hidden");
          syncInterval = setInterval(syncWithGuru, 3000);
        } else { 
          alert("Kode kelas salah atau sedang tidak aktif."); 
        }
      });
    }

    function syncWithGuru() {
      fetch(FIREBASE_URL).then(res => res.json()).then(data => {
        document.getElementById("currentStatus").innerText = "STATUS: " + data.status;
        if(data.status === "Selesai") {
            document.getElementById("classContent").innerHTML = "Sesi telah berakhir oleh Guru.";
            clearInterval(syncInterval);
        } else if(data.status === "Quiz") {
            document.getElementById("classContent").innerHTML = "Guru memulai Kuis! Perhatikan layar depan.";
        } else {
            document.getElementById("classContent").innerHTML = "Materi sedang berlangsung...";
        }
      });
    }

    function toggleTheme() {
      const body = document.body;
      const current = body.getAttribute('data-theme');
      body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    function logout() { 
      if(confirm("Keluar dari aplikasi?")) {
        localStorage.clear(); 
        location.reload(); 
      }
    }

    window.onload = initApp;
  </script>
</body>
</html>
