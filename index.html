<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pustaka Furina v3 - Pro Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-body: #f1f5f9;
      --card-bg: rgba(255, 255, 255, 0.8);
      --text-main: #0f172a;
      --text-soft: #64748b;
      --primary: #2563eb;
      --accent: #7c3aed;
      --nav-bg: rgba(15, 23, 42, 0.9);
      --glass-border: rgba(255, 255, 255, 0.5);
    }

    [data-theme="dark"] {
      --bg-body: #020617;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #f8fafc;
      --text-soft: #94a3b8;
      --nav-bg: rgba(0, 0, 0, 0.8);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      margin: 0; padding: 0; 
      transition: background 0.4s, color 0.4s, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); 
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg-body); 
      color: var(--text-main);
      overflow-x: hidden;
      background-image: 
        radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.1) 0px, transparent 50%);
      min-height: 100vh;
    }

    /* --- CURSOR --- */
    #customCursor {
      width: 20px; height: 20px; border: 2px solid var(--primary);
      background: rgba(37, 99, 235, 0.1); border-radius: 50%;
      position: fixed; pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%); display: none;
    }
    .cursor-hover { transform: translate(-50%, -50%) scale(2.5) !important; background: rgba(37, 99, 235, 0.2) !important; border-color: var(--accent); }
    @media (min-width: 1024px) { #customCursor { display: block; } body { cursor: none; } button, input, .book-card, .nav-item { cursor: none; } }

    /* --- LOGIN --- */
    #loginPage {
      height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1e3a8a, #7c3aed);
    }
    .login-card {
      background: var(--card-bg); padding: 40px; border-radius: 32px;
      width: 90%; max-width: 400px; text-align: center; 
      backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    /* --- HEADER --- */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--card-bg); backdrop-filter: blur(15px);
      padding: 25px 20px; border-bottom: 1px solid var(--glass-border);
    }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .theme-btn { 
      padding: 10px 16px; border-radius: 14px; border: none; 
      background: var(--primary); color: white; font-weight: 700; font-size: 12px;
    }

    /* --- CONTENT --- */
    .content { padding: 20px 20px 140px; max-width: 900px; margin: auto; }
    .books-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    
    .book-card {
      background: var(--card-bg); border-radius: 28px; padding: 16px;
      border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
    }
    .book-card:hover { transform: translateY(-10px); border-color: var(--primary); }

    .book-cover {
      width: 100%; aspect-ratio: 1/1; border-radius: 20px;
      display: flex; align-items: center; justify-content: center; 
      font-size: 48px; margin-bottom: 12px;
    }

    /* --- NAV BAR --- */
    .nav-bar {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      width: 85%; max-width: 400px; background: var(--nav-bg);
      padding: 10px; border-radius: 30px; display: flex; z-index: 1000;
      backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
    }
    .nav-item {
      flex: 1; padding: 14px; text-align: center; color: #94a3b8;
      font-weight: 700; font-size: 14px; border-radius: 22px;
    }
    .nav-item.active { background: white; color: #0f172a; }
    [data-theme="dark"] .nav-item.active { background: var(--primary); color: white; }

    input { 
      width: 100%; padding: 16px; border-radius: 16px; border: 2px solid transparent; 
      background: rgba(0,0,0,0.05); color: var(--text-main); margin-top: 10px;
      font-family: inherit; font-weight: 600;
    }
    .btn-main {
      width: 100%; padding: 18px; border-radius: 18px; border: none;
      background: linear-gradient(45deg, var(--primary), var(--accent));
      color: white; font-weight: 800; margin-top: 20px;
    }
    .hidden { display: none !important; }
    .animate { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="customCursor"></div>

  <div id="loginPage">
    <div class="login-card animate">
      <h1 style="font-size: 50px; margin-bottom: 10px;">📚</h1>
      <h2 style="font-weight: 800; font-size: 28px;">Pustaka Digital</h2>
      <p style="color: var(--text-soft); font-size: 14px; margin-bottom: 30px;">V3 Class Sync Edition</p>
      
      <input type="text" id="usernameInput" placeholder="Nama Pengguna">
      <input type="password" id="passcodeInput" placeholder="Kode Akses (AKUGURU/MURID)">
      <button class="btn-main" onclick="handleLogin()">Masuk Sekarang</button>
    </div>
  </div>

  <div id="mainPage" class="hidden">
    <div class="header">
      <div class="top-bar">
        <div id="roleBadge" style="letter-spacing: 1px; font-size: 10px; font-weight: 800; color: var(--primary); background: rgba(37,99,235,0.1); padding: 4px 10px; border-radius: 20px;">OFFLINE</div>
        <button class="theme-btn" onclick="toggleTheme()">🌓 Mode</button>
      </div>
      <h2 id="welcomeText" style="font-weight: 800; font-size: 24px;">Halo! 👋</h2>
      <input type="text" id="searchInput" placeholder="Cari materi belajar...">
    </div>

    <div class="content">
      <div id="bookList" class="books-grid"></div>

      <div id="kelasSection" class="hidden animate">
        <div style="background: var(--card-bg); padding: 30px 20px; border-radius: 32px; text-align: center; border: 1px solid var(--glass-border); backdrop-filter: blur(10px);">
            
            <div id="guruView" class="hidden">
                <p style="color: var(--text-soft); font-weight: 600;">Kontrol Kelas Digital</p>
                <h1 id="activeCode" style="font-size: 48px; margin: 10px 0; color: var(--primary); letter-spacing: 8px; font-weight: 800;">-----</h1>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                    <button class="btn-main" onclick="updateClassStatus('Quiz')" style="background: #ef4444; margin: 0;">📝 Mulai Kuis</button>
                    <button class="btn-main" onclick="updateClassStatus('Presentasi')" style="background: #7c3aed; margin: 0;">📺 Presentasi</button>
                </div>
                <button class="btn-main" onclick="updateClassStatus('Selesai')" style="background: #64748b; margin-top: 10px;">🔴 Akhiri Kelas</button>
            </div>

            <div id="muridView" class="hidden">
                <div id="joinArea">
                    <h3 style="font-weight: 800; margin-bottom: 10px;">Gabung Kelas</h3>
                    <p style="color: var(--text-soft); font-size: 13px; margin-bottom: 15px;">Masukkan kode dari Guru untuk sinkronisasi</p>
                    <input type="text" id="inputClassCode" placeholder="Kode Kelas" style="text-align: center; letter-spacing: 4px;">
                    <button class="btn-main" onclick="joinClass()">Gabung Sekarang</button>
                </div>

                <div id="liveClassArea" class="hidden">
                    <div style="background: var(--primary); color: white; padding: 15px; border-radius: 20px; margin-bottom: 20px;">
                        <p style="font-size: 11px; opacity: 0.8; font-weight: 700;">LIVE STATUS:</p>
                        <h2 id="currentStatus" style="font-weight: 800; text-transform: uppercase;">Menunggu...</h2>
                    </div>
                    <div id="classContent" style="padding: 30px 20px; border: 2px dashed var(--primary); border-radius: 20px; color: var(--text-soft); font-weight: 600;">
                        Menunggu instruksi Guru...
                    </div>
                </div>
            </div>
        </div>
      </div>
    </div>

    <div class="nav-bar">
      <div class="nav-item active" id="nav-books" onclick="showSection('books')">Koleksi</div>
      <div class="nav-item" id="nav-kelas" onclick="showSection('kelas')">Kelas</div>
      <div class="nav-item" onclick="logout()" style="color: #ef4444;">Keluar</div>
    </div>
  </div>

  <script>
    const FIREBASE_URL = "https://perpustakaan-digital-5e62a-default-rtdb.asia-southeast1.firebasedatabase.app/class_sync.json";
    const ACCESS_KEYS = { "AKUGURU": "Guru", "MURID": "Murid" };
    
    const books = [
      { title: "Matematika", file: "matematika.pdf", emoji: "📐", color: "#3b82f6" },
      { title: "Sejarah", file: "sejarah.pdf", emoji: "📜", color: "#f59e0b" },
      { title: "Biologi", file: "biologi.pdf", emoji: "🌿", color: "#10b981" },
      { title: "Fisika", file: "fisika.pdf", emoji: "⚛️", color: "#ef4444" },
      { title: "Sains", file: "sains.pdf", emoji: "🔬", color: "#8b5cf6" }
    ];

    // --- CURSOR LOGIC ---
    const cursor = document.getElementById('customCursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // --- THEME ---
    function toggleTheme() {
      const target = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', target);
      localStorage.setItem('theme', target);
    }

    // --- AUTH ---
    function handleLogin() {
      const userVal = document.getElementById("usernameInput").value.trim();
      const passVal = document.getElementById("passcodeInput").value.trim().toUpperCase();

      if (userVal === "") return alert("Nama tidak boleh kosong!");
      if (ACCESS_KEYS[passVal]) {
        localStorage.setItem("user_role", ACCESS_KEYS[passVal]);
        localStorage.setItem("user_name", userVal);
        initApp();
      } else { alert("Kode Akses Salah!"); }
    }

    function initApp() {
      const role = localStorage.getItem("user_role");
      const name = localStorage.getItem("user_name");
      if(!role || !name) return;

      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("mainPage").classList.remove("hidden");
      document.getElementById("welcomeText").innerText = `Halo, ${name}! 👋`;
      document.getElementById("roleBadge").innerText = `${role.toUpperCase()} MODE`;
      
      const theme = localStorage.getItem('theme');
      if(theme) document.body.setAttribute('data-theme', theme);

      showSection('books');
      renderBooks("");
    }

    // --- BOOKS ---
    function renderBooks(kw) {
      const list = document.getElementById("bookList");
      list.innerHTML = "";
      books.filter(b => b.title.toLowerCase().includes(kw.toLowerCase())).forEach(b => {
        list.innerHTML += `
          <div class="book-card animate" onclick="window.open('books/${b.file}', '_blank')">
            <div class="book-cover" style="background: ${b.color}15; color: ${b.color};">${b.emoji}</div>
            <div style="font-weight: 800; font-size: 16px; margin-bottom: 4px;">${b.title}</div>
            <div style="font-size: 11px; color: var(--text-soft); font-weight: 600;">Materi PDF</div>
          </div>`;
      });
    }

    // --- NAVIGATION ---
    function showSection(type) {
      document.getElementById("bookList").classList.toggle("hidden", type !== 'books');
      document.getElementById("kelasSection").classList.toggle("hidden", type !== 'kelas');
      document.getElementById("nav-books").classList.toggle("active", type === 'books');
      document.getElementById("nav-kelas").classList.toggle("active", type === 'kelas');
      if(type === 'kelas') setupKelasUI();
    }

    // --- KELAS LOGIC (SYNC) ---
    function setupKelasUI() {
      const isGuru = localStorage.getItem("user_role") === "Guru";
      document.getElementById("guruView").classList.toggle("hidden", !isGuru);
      document.getElementById("muridView").classList.toggle("hidden", isGuru);
      
      fetch(FIREBASE_URL).then(res => res.json()).then(data => { 
        if(data && data.code) document.getElementById("activeCode").innerText = data.code; 
      });
    }

    function updateClassStatus(tipe) {
      // Jika akhiri kelas, reset kode. Jika baru mulai dan kode masih kosong, buat baru.
      let currentCode = document.getElementById("activeCode").innerText;
      if (tipe === 'Selesai') {
          currentCode = "-----";
      } else if (currentCode === "-----") {
          currentCode = Math.random().toString(36).substring(2, 7).toUpperCase();
      }

      const payload = { code: currentCode, status: tipe };

      fetch(FIREBASE_URL, { method: 'PUT', body: JSON.stringify(payload) })
      .then(() => {
        document.getElementById("activeCode").innerText = payload.code;
        alert("Mode Kelas: " + tipe);
      });
    }

    let syncInterval;
    function joinClass() {
      const input = document.getElementById("inputClassCode").value.trim().toUpperCase();
      fetch(FIREBASE_URL).then(res => res.json()).then(data => {
        if (input === data.code && data.code !== "-----") {
            alert("✅ Terhubung ke Kelas!");
            document.getElementById("joinArea").classList.add("hidden");
            document.getElementById("liveClassArea").classList.remove("hidden");
            
            // Mulai monitoring real-time
            if(syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(syncWithGuru, 3000);
            syncWithGuru(); 
        } else {
            alert("❌ Kode salah atau kelas belum dibuka.");
        }
      });
    }

    function syncWithGuru() {
        fetch(FIREBASE_URL).then(res => res.json()).then(data => {
            const statusEl = document.getElementById("currentStatus");
            const contentEl = document.getElementById("classContent");
            
            statusEl.innerText = data.status;

            if(data.status === "Quiz") {
                contentEl.innerHTML = "📝 <br><br> Guru sedang memulai <b>KUIS</b>.<br>Silahkan lihat soal di papan tulis!";
                contentEl.style.borderColor = "#ef4444";
            } else if(data.status === "Presentasi") {
                contentEl.innerHTML = "📺 <br><br> Guru sedang menjelaskan <b>MATERI</b>.<br>Silahkan buka buku yang relevan.";
                contentEl.style.borderColor = "#7c3aed";
            } else {
                contentEl.innerHTML = "Kelas telah berakhir atau belum dimulai.";
                statusEl.innerText = "OFFLINE";
                contentEl.style.borderColor = "var(--glass-border)";
            }
        });
    }

    function logout() { 
        if(syncInterval) clearInterval(syncInterval);
        localStorage.clear(); 
        location.reload(); 
    }

    document.getElementById("searchInput").oninput = (e) => renderBooks(e.target.value);
    window.onload = initApp;
  </script>
</body>
</html>
